name: Publish to npm

# Publishes the package whenever you create a GitHub Release.
# Auth is via npm OIDC Trusted Publishing — NO NPM_TOKEN / secret required.
# The trust is configured on npmjs.com (package → Settings → Trusted Publisher)
# and MUST match this repo + this workflow filename exactly:
#   Organization or user: aybouzaglou
#   Repository:           autotask-rest-api-types
#   Workflow filename:    publish.yml
#   Environment:          (leave EMPTY — this job sets no environment)
on:
  release:
    types: [published]
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required: lets the runner mint the OIDC token npm verifies
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # NOTE: deliberately NO `registry-url` here. setup-node's registry-url
      # writes an .npmrc with a placeholder auth token, which makes npm take the
      # legacy token path instead of OIDC. Omitting it lets OIDC kick in.
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # OIDC trusted publishing requires Node >= 22.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify (typecheck + tests)
        run: pnpm check

      # OIDC trusted publishing requires npm CLI >= 11.5.1 (Node 22 ships npm 10).
      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest

      # No token: OIDC authenticates automatically against the trusted publisher,
      # and provenance attestations are generated by default when publishing.
      - name: Publish
        run: npm publish --access public
